name: bloc
description: Generate a new Bloc in Dart. Built for the bloc state management library.
version: 0.3.0
repository: https://github.com/felangel/bloc/tree/master/bricks/bloc

environment:
  mason: ">=0.1.0-dev.32 <0.1.0"

vars:
  name:
    type: string
    description: The name of the bloc class.
    default: counter
    prompt: What is the bloc name?
  repository:
    type: string
    description: The repository name.
    prompt: What is the repository name?
  use_status:
    type: boolean
    description: Whether to use the status package.
    default: false
    prompt: Would you like to use status for your state?
